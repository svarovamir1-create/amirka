{% extends 'base.html' %}

{% block content %}
<div style="max-width:500px; margin:auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); text-align:center;">
    <h1>Удалить пост?</h1>
    <p style="font-size:16px; margin:20px 0;"><strong>{{ object.title }}</strong></p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" style="padding:10px 20px; background:#e74c3c; color:white; border:none; border-radius:4px;">Удалить</button>
    </form>

    <div style="margin-top:15px;">
        <a href="{% url 'posts:list' %}" style="text-decoration:none; color:#3498db;">⬅ Назад к списку постов</a>
    </div>
</div>
{% endblock %}
