<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Shop{% endblock %}</title>

  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }

    header {
      background: #111;
      color: white;
      padding: 15px 0;
    }

    .header-container {
      width: 90%;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: white;
      text-decoration: none;
    }

    nav a {
      color: white;
      margin-left: 15px;
      text-decoration: none;
      font-size: 14px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      width: 90%;
      margin: 30px auto;
    }

    /* 🔥 КНОПКИ */
    .btn {
      display: inline-block;
      padding: 10px 18px;
      background: #4CAF50;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #45a049;
      transform: scale(1.05);
    }

    .logout-btn {
      background: red;
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .logout-btn:hover {
      background: darkred;
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 50px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-container">
    <a href="{% url 'catalog:home' %}" class="logo">Shop</a>

    <nav>
      <a href="{% url 'catalog:home' %}" class="btn">Главная</a>
      <a href="{% url 'catalog:cart' %}" class="btn">Корзина</a>

      {% if user.is_authenticated %}
        <span>Привет, {{ user.username }} |</span>

        <form action="{% url 'logout' %}" method="post" style="display:inline;">
          {% csrf_token %}
          <button type="submit" class="logout-btn">Выйти</button>
        </form>

        <a href="{% url 'catalog:my_orders' %}" class="btn">Мои заказы</a>
      {% else %}
        <a href="{% url 'login' %}" class="btn">Войти</a>
        <a href="{% url 'catalog:register' %}" class="btn">Регистрация</a>
      {% endif %}
    </nav>
  </div>
</header>

<main class="container">
  {% block content %}{% endblock %}
</main>

<footer>
  <p>&copy; 2026 Shop. Все права защищены.</p>
</footer>

</body>
</html>
