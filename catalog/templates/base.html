<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Shop{% endblock %}</title>

  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }

    header {
      background: black;
      color: white;
      padding: 15px;
    }

    header a {
      color: white;
      margin-right: 15px;
      text-decoration: none;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    img { max-width: 150px; }

    .logout-btn {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <a href="{% url 'catalog:home' %}">Главная</a>
  <a href="{% url 'catalog:cart' %}">Корзина</a>

  {% if user.is_authenticated %}
    Привет, {{ user.username }} |

    <!-- ✅ ПРАВИЛЬНЫЙ logout -->
    <form action="{% url 'logout' %}" method="post" style="display:inline;">
      {% csrf_token %}
      <button type="submit" class="logout-btn">Выйти</button>
    </form>

    <a href="{% url 'catalog:my_orders' %}">Мои заказы</a>
  {% else %}
    <a href="{% url 'login' %}">Войти</a>
    <a href="{% url 'catalog:register' %}">Регистрация</a>
  {% endif %}
</header>

<div class="container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
