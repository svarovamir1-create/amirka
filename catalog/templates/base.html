<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Shop{% endblock %}</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
    }

    header a {
      color: white;
      margin-right: 15px;
      text-decoration: none;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    img {
      max-width: 150px;
    }
  </style>
</head>
<body>

<header>
  <a href="{% url 'catalog:home' %}">Главная</a>
</header>

<div class="container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
